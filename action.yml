name: 'Setup APM'
description: 'Install agent primitives (skills, instructions, agents) for your CI workflows. One line. Zero config.'
author: 'microsoft'
branding:
  icon: 'package'
  color: 'purple'

inputs:
  working-directory:
    description: 'Working directory for execution. In non-isolated mode, this directory must exist and contain your apm.yml. In isolated, pack, or bundle modes the action creates it automatically.'
    required: false
    default: '.'
  apm-version:
    description: 'APM version to install (default: latest stable)'
    required: false
    default: 'latest'
  script:
    description: 'APM script to run after install (optional — by default only install runs)'
    required: false
    default: ''
  dependencies:
    description: 'YAML array of extra dependencies to install (additive to apm.yml). Supports strings (owner/repo) and objects ({git: url, path: subdir, ref: branch}).'
    required: false
    default: ''
  isolated:
    description: 'Ignore apm.yml and clear pre-existing primitive dirs (instructions/, agents/, skills/, prompts/) under .github/ — install only the inline dependencies'
    required: false
    default: 'false'
  compile:
    description: 'Run apm compile after install to generate AGENTS.md'
    required: false
    default: 'false'
  pack:
    description: 'Pack a bundle after install. Format is controlled by `bundle-format` (default: apm). Produces .tar.gz by default.'
    required: false
    default: 'false'
  bundle-format:
    description: |
      Format for `pack: true`. One of:
        - apm     (default)  Classic APM bundle: apm.lock.yaml + .github/.claude trees.
                             Round-trips through this action's restore mode.
        - plugin             Claude Code marketplace layout: plugin.json + flat
                             agents/, skills/, commands/, instructions/ dirs.
                             NOTE: plugin-format restore is NOT supported by this
                             action yet -- consume plugin bundles with your plugin
                             tooling, or re-pack with bundle-format: apm.
    required: false
    default: ''
  bundle:
    description: 'Restore from a bundle (local path or glob pattern). Skips APM installation entirely.'
    required: false
    default: ''
  bundles-file:
    description: |
      Path to a UTF-8 text file with one bundle path per line (paths must end
      in '.tar.gz'). Lines starting with '#' are comments; blank lines are
      ignored. Glob patterns are NOT expanded -- generate the list yourself
      with 'find ... | sort' or equivalent.
      Bundles are restored in caller-specified order (later bundles win on
      file collisions; the action emits a warning before the loop runs so
      the policy is explicit). Mutually exclusive with 'pack' and 'bundle'.
    required: false
    default: ''
  target:
    description: 'Bundle target: copilot, vscode, claude, or all (used with pack: true)'
    required: false
    default: ''
  archive:
    description: 'Produce .tar.gz instead of directory (used with pack: true)'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for API calls (avoids rate limits). Defaults to the automatic GITHUB_TOKEN.'
    required: false
    default: '${{ github.token }}'
  audit-report:
    description: 'Generate a SARIF audit report during install/unpack. Set to "true" for default path (apm-audit.sarif), or provide a custom file path.'
    required: false
    default: ''
  setup-only:
    description: 'Install the APM CLI onto PATH and exit. Skips apm install and all project-level operations. Use subsequent steps to run apm commands directly. Mutually exclusive with pack, bundle, bundles-file, isolated, compile, script, dependencies, audit-report, target, archive, bundle-format.'
    required: false
    default: 'false'

outputs:
  success:
    description: 'Whether the action succeeded (true/false)'
  primitives-path:
    description: 'Path where agent primitives were deployed (.github)'
  bundle-path:
    description: 'Path to the packed bundle (only set in pack mode)'
  bundle-format:
    description: 'Format of the produced or restored bundle: "apm" or "plugin". Set in pack mode and single-bundle restore mode.'
  audit-report-path:
    description: 'Path to the generated SARIF audit report, if audit-report was enabled'
  bundles-restored:
    description: 'Number of bundles successfully restored (multi-bundle mode only).'
  apm-version:
    description: 'Resolved APM CLI version string (e.g. "0.11.0"). Set in setup-only mode.'
  apm-path:
    description: 'Full path to the apm executable that was installed. Set in setup-only mode (empty when reusing a pre-existing apm on PATH).'

runs:
  using: 'node24'
  main: 'dist/index.js'
