name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist/ is up-to-date
        run: |
          CHANGED=$(git diff --name-only dist/ | grep -v '\.d\.ts\.map$' || true)
          if [ -n "$CHANGED" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            echo "$CHANGED"
            exit 1
          fi

  # Integration: default flow (apm.yml manifest)
  test-manifest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml
        run: |
          cat > apm.yml << 'EOF'
          name: ci-test
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

      - name: Test - install from apm.yml
        uses: ./

      - name: Verify primitives deployed from manifest
        run: |
          if ! find .github -type f \( -name "*.instructions.md" -o -name "*.agent.md" -o -name "*.prompt.md" -o -name "SKILL.md" \) | grep -q .; then
            echo "::error::No primitives deployed from apm.yml"
            exit 1
          fi
          echo "✅ Primitives deployed from manifest"

  # Integration: isolated mode (inline deps only, clean .github/)
  test-isolated:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Create apm.yml that should be ignored
        run: |
          cat > apm.yml << 'EOF'
          name: should-be-ignored
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package/.apm/agents/design-reviewer.agent.md
          EOF

      - name: Plant pre-existing primitives that should be cleared
        run: |
          mkdir -p .github/agents .github/instructions
          echo '# Stale agent' > .github/agents/stale.agent.md
          echo '# Stale instruction' > .github/instructions/stale.instructions.md

      - name: Test - isolated with inline deps
        uses: ./
        with:
          isolated: 'true'
          dependencies: |
            - microsoft/apm-sample-package/.apm/skills/style-checker

      - name: Verify isolated mode used only inline deps
        run: |
          if ! find .github/skills -type f -name "SKILL.md" 2>/dev/null | grep -q .; then
            echo "::error::Skill primitive not deployed — inline deps were not used"
            exit 1
          fi
          if find .github/agents -type f -name "*.agent.md" 2>/dev/null | grep -q .; then
            echo "::error::Agent primitive found — pre-existing primitives were NOT cleared"
            exit 1
          fi
          if find .github/instructions -type f -name "*.instructions.md" 2>/dev/null | grep -q .; then
            echo "::error::Instruction primitive found — pre-existing primitives were NOT cleared"
            exit 1
          fi
          echo "✅ Isolated mode: cleared existing primitives, installed only inline deps"

  # Integration: compile flag
  test-compile:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Test - isolated + compile
        uses: ./
        with:
          isolated: 'true'
          compile: 'true'
          dependencies: |
            - microsoft/apm-sample-package

      - name: Verify AGENTS.md compiled
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "::error::AGENTS.md not found — compile did not run"
            exit 1
          fi
          echo "✅ AGENTS.md compiled successfully"

  # Integration: pack mode (install → pack → verify bundle output)
  test-pack:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        bundle-format: [apm, plugin]
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml
        run: |
          cat > apm.yml << 'EOF'
          name: ci-test-pack
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

      - name: Test - install + pack
        id: pack
        uses: ./
        with:
          pack: 'true'
          target: 'vscode'
          bundle-format: ${{ matrix.bundle-format }}

      - name: Verify bundle-path and bundle-format outputs are set
        run: |
          BUNDLE="${{ steps.pack.outputs.bundle-path }}"
          FORMAT="${{ steps.pack.outputs.bundle-format }}"
          if [ -z "$BUNDLE" ]; then
            echo "::error::bundle-path output not set"
            exit 1
          fi
          if [ "$FORMAT" != "${{ matrix.bundle-format }}" ]; then
            echo "::error::bundle-format output is '$FORMAT', expected '${{ matrix.bundle-format }}'"
            exit 1
          fi
          echo "Bundle path: $BUNDLE (format=$FORMAT)"

      - name: Verify bundle archive exists and is valid
        run: |
          BUNDLE="${{ steps.pack.outputs.bundle-path }}"
          if [ ! -f "$BUNDLE" ]; then
            echo "::error::Bundle file not found: $BUNDLE"
            exit 1
          fi
          if ! file "$BUNDLE" | grep -q 'gzip'; then
            echo "::error::Bundle is not a valid gzip archive"
            exit 1
          fi

      - name: Verify APM bundle layout (apm.lock.yaml + .github/)
        if: matrix.bundle-format == 'apm'
        run: |
          BUNDLE="${{ steps.pack.outputs.bundle-path }}"
          CONTENTS=$(tar tzf "$BUNDLE")
          echo "$CONTENTS" | grep -q 'apm.lock.yaml' || { echo "::error::APM bundle missing apm.lock.yaml"; exit 1; }
          echo "$CONTENTS" | grep -q '.github/' || { echo "::error::APM bundle missing .github/"; exit 1; }
          echo "$CONTENTS" | grep -q 'plugin.json' && { echo "::error::APM bundle should not contain plugin.json"; exit 1; }
          echo "Pack(apm) layout valid"

      - name: Verify plugin bundle layout (plugin.json, no apm.lock.yaml)
        if: matrix.bundle-format == 'plugin'
        run: |
          BUNDLE="${{ steps.pack.outputs.bundle-path }}"
          CONTENTS=$(tar tzf "$BUNDLE")
          echo "$CONTENTS" | grep -q 'plugin.json' || { echo "::error::Plugin bundle missing plugin.json"; exit 1; }
          echo "$CONTENTS" | grep -q 'apm.lock.yaml' && { echo "::error::Plugin bundle should not contain apm.lock.yaml"; exit 1; }
          echo "Pack(plugin) layout valid"

  # Integration: setup-only mode -- install CLI and exit, do not run apm install.
  test-setup-only:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Snapshot pre-action .github tree
        id: snap
        run: |
          # Capture .github contents before invoking the action so we can
          # detect whether setup-only deployed anything (the apm-action repo
          # itself ships .github/agents/, .github/aw/, .github/workflows/).
          if [ -d .github ]; then
            find .github -mindepth 1 -maxdepth 2 -type d | sort > /tmp/github-before.txt
          else
            : > /tmp/github-before.txt
          fi

      - name: Run action in setup-only mode
        id: setup
        uses: ./
        with:
          setup-only: 'true'

      - name: Verify CLI is on PATH and outputs are set
        run: |
          if ! command -v apm >/dev/null; then
            echo "::error::apm is not on PATH after setup-only"
            exit 1
          fi
          if [ -z "${{ steps.setup.outputs.apm-version }}" ]; then
            echo "::error::apm-version output not set"
            exit 1
          fi
          if [ -z "${{ steps.setup.outputs.apm-path }}" ]; then
            echo "::error::apm-path output not set"
            exit 1
          fi
          echo "Resolved apm-version: ${{ steps.setup.outputs.apm-version }}"
          echo "Resolved apm-path: ${{ steps.setup.outputs.apm-path }}"
          echo "apm --version reports: $(apm --version)"

      - name: Verify no install ran (no new primitives, no apm.lock.yaml)
        run: |
          if [ -d .github ]; then
            find .github -mindepth 1 -maxdepth 2 -type d | sort > /tmp/github-after.txt
          else
            : > /tmp/github-after.txt
          fi
          if ! diff -q /tmp/github-before.txt /tmp/github-after.txt >/dev/null; then
            echo "::error::setup-only modified .github/ tree"
            diff /tmp/github-before.txt /tmp/github-after.txt || true
            exit 1
          fi
          if [ -f apm.lock.yaml ]; then
            echo "::error::setup-only generated apm.lock.yaml (apm install must not have run)"
            exit 1
          fi
          echo "setup-only correctly skipped install"

      - name: Use the installed CLI directly
        run: |
          cat > apm.yml << 'EOF'
          name: ci-setup-only-driver
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF
          apm install
          test -d .github/skills

  # Integration: plugin bundle is rejected by restore (clear error, no clobber).
  test-restore-plugin-rejected:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml
        run: |
          cat > apm.yml << 'EOF'
          name: ci-test-plugin-restore
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

      - name: Pack a plugin-format bundle
        id: pack
        uses: ./
        with:
          pack: 'true'
          target: 'vscode'
          bundle-format: 'plugin'

      - name: Move bundle aside and clear workspace
        run: |
          mkdir -p /tmp/apm-bundles
          cp "${{ steps.pack.outputs.bundle-path }}" /tmp/apm-bundles/plugin.tar.gz
          rm -rf .github/instructions .github/agents .github/skills .github/prompts apm.yml apm.lock.yaml

      - name: Attempt restore -- expect failure
        id: restore
        continue-on-error: true
        uses: ./
        with:
          bundle: '/tmp/apm-bundles/plugin.tar.gz'

      - name: Assert restore failed with plugin-format error
        run: |
          if [ "${{ steps.restore.outcome }}" != "failure" ]; then
            echo "::error::restore should have failed for a plugin-format bundle, got ${{ steps.restore.outcome }}"
            exit 1
          fi
          if [ -d .github/skills ] || [ -d .github/agents ]; then
            echo "::error::workspace was clobbered by a rejected restore"
            exit 1
          fi
          echo "plugin-format restore correctly rejected"

  # Integration: restore from artifact (cross-job pack → upload → download → restore)
  test-restore-artifact:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml
        run: |
          cat > apm.yml << 'EOF'
          name: ci-test-restore
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

      - name: Pack bundle
        id: pack
        uses: ./
        with:
          pack: 'true'
          target: 'vscode'

      - name: Clear deployed primitives (simulate fresh consumer)
        run: |
          rm -rf .github/instructions .github/agents .github/skills .github/prompts
          echo "Cleared .github/ primitives"

      - name: Copy bundle to workspace root (simulate download-artifact)
        run: cp "${{ steps.pack.outputs.bundle-path }}" ./

      - name: Test - restore from local bundle
        uses: ./
        with:
          bundle: './*.tar.gz'

      - name: Verify primitives restored
        run: |
          if ! find .github -type f \( -name "*.instructions.md" -o -name "*.agent.md" -o -name "*.prompt.md" -o -name "SKILL.md" \) | grep -q .; then
            echo "::error::No primitives found after restore"
            exit 1
          fi
          echo "✅ Restore mode: primitives restored from bundle"

  # Integration: regression test for microsoft/apm-action#26.
  #
  # Reproduces the gh-aw pull_request_target scenario: when the workflow
  # checkout is the base branch and the triggering PR modifies apm.lock.yaml,
  # the post-restore `git checkout <pr-sha> -- .` must succeed. Before the fix
  # it failed with `error: Your local changes to the following files would be
  # overwritten by checkout: apm.lock.yaml`, because the action's tar fallback
  # had dumped the bundle's apm.lock.yaml on top of the tracked one.
  #
  # The check has two halves:
  #   (1) `git status` after restore must show no modifications to apm.lock.yaml
  #       or apm.yml. apm unpack writes only files listed in the lockfile's
  #       `deployed_files` -- not the lockfile or manifest themselves.
  #   (2) A git checkout to a different ref must succeed without conflict.
  test-restore-clean-workspace:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml + commit a baseline lockfile
        run: |
          # Configure git identity so we can commit in the runner.
          git config user.email "ci@apm-action.local"
          git config user.name "apm-action ci"

          # Create a throwaway branch so we can manipulate tracked files
          # without touching the PR source.
          git checkout -b ci/restore-clean-workspace-test

          cat > apm.yml << 'EOF'
          name: ci-test-restore-clean
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

          # Commit a placeholder apm.lock.yaml so it is *tracked* by git.
          # This is the precondition that makes the bug fire: the file in
          # working-directory is tracked, so any extraneous write to it
          # surfaces in `git status` and blocks subsequent `git checkout`.
          cat > apm.lock.yaml << 'EOF'
          # placeholder lockfile - replaced by pack step below
          version: 1
          packages: {}
          EOF
          git add apm.yml apm.lock.yaml
          git commit -m "test fixture: tracked apm.yml + apm.lock.yaml" --quiet

          # Capture the SHA of the "tracked baseline" so we can git-checkout
          # back to it after restore -- this is the operation that breaks if
          # restore dirties the tracked files.
          BASELINE_SHA=$(git rev-parse HEAD)
          echo "BASELINE_SHA=$BASELINE_SHA" >> "$GITHUB_ENV"

      - name: Pack bundle
        id: pack
        uses: ./
        with:
          pack: 'true'
          target: 'vscode'

      - name: Stash bundle and reset workspace to the tracked baseline
        run: |
          # Move the bundle out of the workspace so subsequent git operations
          # don't see it.
          mkdir -p /tmp/apm-bundle
          cp "${{ steps.pack.outputs.bundle-path }}" /tmp/apm-bundle/

          # Reset to the tracked baseline so we are testing restore against a
          # clean git state with apm.lock.yaml + apm.yml *tracked*.
          rm -rf .github/instructions .github/agents .github/skills .github/prompts apm_modules build
          git checkout -- .
          git clean -fd
          test -z "$(git status --porcelain)" || {
            echo "::error::pre-restore workspace is dirty: $(git status --porcelain)"; exit 1; }

      - name: Test - restore bundle into the tracked git checkout
        uses: ./
        with:
          bundle: '/tmp/apm-bundle/*.tar.gz'

      - name: Assert apm.lock.yaml + apm.yml were NOT modified by restore
        run: |
          # Restore must not touch tracked metadata files. If `git status` shows
          # apm.lock.yaml or apm.yml as modified, the action is leaking bundle
          # metadata into working-directory -- the exact bug from #26.
          DIRTY_META=$(git status --porcelain apm.lock.yaml apm.yml)
          if [ -n "$DIRTY_META" ]; then
            echo "::error::Restore modified tracked apm metadata files (#26 regression):"
            echo "$DIRTY_META"
            echo
            echo "--- diff ---"
            git --no-pager diff apm.lock.yaml apm.yml
            exit 1
          fi
          echo "✅ apm.lock.yaml and apm.yml are pristine after restore"

      - name: Assert primitives WERE deployed
        run: |
          if ! find .github -type f \( -name "*.instructions.md" -o -name "*.agent.md" -o -name "*.prompt.md" -o -name "SKILL.md" \) | grep -q .; then
            echo "::error::No primitives found after restore"
            exit 1
          fi
          echo "✅ Primitives deployed under .github/"

      - name: Assert subsequent git checkout succeeds (the actual #26 symptom)
        run: |
          # This is the operation that originally failed in the gh-aw flow:
          # `git checkout <pr-sha> -- .` after the action ran. We replay it here
          # by checking out the tracked baseline. Before the fix this aborted
          # with "Your local changes to the following files would be overwritten
          # by checkout: apm.lock.yaml". After the fix it must succeed cleanly.
          if ! git checkout "$BASELINE_SHA" -- . 2>checkout.err; then
            echo "::error::git checkout failed after restore -- this is the #26 regression"
            cat checkout.err
            exit 1
          fi
          echo "✅ Post-restore git checkout succeeded (no #26 regression)"

  # Release: update major version tag (v1 → v1.x.x)
  release:
    needs: [build, test-manifest, test-isolated, test-compile, test-pack, test-restore-artifact, test-restore-clean-workspace]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update major version tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
