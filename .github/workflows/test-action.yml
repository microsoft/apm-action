name: 'Test: APM Action'

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-inline-deps:
    name: Install with inline dependencies (additive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run apm-action with inline deps
        uses: microsoft/apm-action@main
        with:
          dependencies: |
            - microsoft/apm-sample-package

      - name: Verify primitives deployed to .github
        run: |
          echo "=== Checking .github primitives ==="

          if [ ! -d ".github" ]; then
            echo "FAIL: .github directory not found"
            exit 1
          fi

          echo "--- Deployed structure ---"
          find .github -type f | grep -v workflows | head -30

          for dir in skills agents prompts instructions; do
            if [ -d ".github/$dir" ]; then
              COUNT=$(find ".github/$dir" -type f | wc -l)
              echo "$dir/: $COUNT files"
            fi
          done

          if [ -f "AGENTS.md" ]; then
            echo "FAIL: AGENTS.md exists but compile was not requested"
            exit 1
          fi

          TOTAL=$(find .github -type f | grep -v workflows | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "FAIL: No primitives deployed"
            exit 1
          fi

          echo "SUCCESS: $TOTAL primitive files deployed to .github"

  test-isolated:
    name: Install with isolated mode (exclusive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run apm-action with isolated mode
        uses: microsoft/apm-action@main
        with:
          isolated: 'true'
          dependencies: |
            - microsoft/apm-sample-package

      - name: Verify primitives deployed
        run: |
          echo "=== Checking .github primitives (isolated) ==="

          TOTAL=$(find .github -type f | grep -v workflows | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "FAIL: No primitives deployed"
            exit 1
          fi

          echo "SUCCESS: $TOTAL primitive files deployed via isolated mode"

  test-with-compile:
    name: Install + compile from apm.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create test apm.yml
        run: |
          cat > apm.yml << 'EOF'
          name: action-test
          version: 1.0.0
          dependencies:
            apm:
              - microsoft/apm-sample-package
          EOF

      - name: Run apm-action with compile
        uses: microsoft/apm-action@main
        with:
          compile: 'true'

      - name: Verify primitives and AGENTS.md
        run: |
          echo "=== Checking .github primitives ==="

          if [ ! -d ".github" ]; then
            echo "FAIL: .github directory not found"
            exit 1
          fi

          find .github -type f | grep -v workflows | head -20

          if [ ! -f "AGENTS.md" ]; then
            echo "FAIL: AGENTS.md not found — compile did not run"
            exit 1
          fi

          echo "--- AGENTS.md ---"
          head -15 AGENTS.md

          TOTAL=$(find .github -type f -name "*.md" | grep -v workflows | wc -l)
          echo "SUCCESS: $TOTAL primitive files deployed, AGENTS.md compiled"
